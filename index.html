<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TradeX PRO V6</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
margin:0;
}

header{
background:#1e293b;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

h1{
margin:0;
font-size:18px;
}

.panel{
background:#1e293b;
padding:15px;
margin:10px;
border-radius:10px;
}

button{
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
}

.connect{
background:#06b6d4;
color:white;
width:100%;
margin-top:10px;
}

.start{
background:#22c55e;
color:white;
width:100%;
margin-top:10px;
}

.stop{
background:#ef4444;
color:white;
width:100%;
margin-top:10px;
}

input,select{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:10px;
border-radius:6px;
border:none;
}

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin:10px;
}

.card{
background:#1e293b;
padding:10px;
border-radius:8px;
}

canvas{
background:#0f172a;
width:100%;
border-radius:10px;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
padding:6px;
font-size:12px;
border-bottom:1px solid #334155;
}

.log{
height:150px;
overflow:auto;
font-family:monospace;
font-size:11px;
}

</style>
</head>

<body>

<header>
<h1>⚡ TradeX PRO V6</h1>
<div id="status">Disconnected</div>
</header>


<div class="panel">

<label>Deriv API Token</label>
<input id="token">

<button class="connect" onclick="connect()">Connect</button>

<label>Market</label>

<select id="symbol">

<option value="R_25">Volatility 25</option>
<option value="R_50">Volatility 50</option>
<option value="R_75">Volatility 75</option>
<option value="R_100">Volatility 100</option>

</select>


<label>Stake</label>
<input id="stake" value="1">

<label>Duration (seconds)</label>
<input id="duration" value="30">


<button id="startBtn" class="start" onclick="toggleBot()" disabled>START BOT</button>

</div>


<div class="stats">

<div class="card">
Balance
<div id="balance">$0</div>
</div>

<div class="card">
Profit
<div id="profit">$0</div>
</div>

<div class="card">
Trades
<div id="trades">0</div>
</div>

<div class="card">
Win Rate
<div id="winrate">0%</div>
</div>

</div>


<div class="panel">

<canvas id="chart" height="120"></canvas>

</div>


<div class="panel">

<h3>Trade History</h3>

<table>

<thead>
<tr>
<th>Time</th>
<th>Type</th>
<th>Stake</th>
<th>Result</th>
<th>P/L</th>
</tr>
</thead>

<tbody id="history"></tbody>

</table>

</div>


<div class="panel">

<h3>Log</h3>

<div class="log" id="log"></div>

</div>


<script>

const WS="wss://ws.derivws.com/websockets/v3?app_id=1089"

let ws
let connected=false
let trading=false
let ticks=[]
let contract=null

let stats={
balance:0,
profit:0,
trades:0,
wins:0,
loss:0
}

function log(msg){

let d=document.createElement("div")
d.textContent="["+new Date().toLocaleTimeString()+"] "+msg

let area=document.getElementById("log")
area.prepend(d)

}

function connect(){

let token=document.getElementById("token").value

ws=new WebSocket(WS)

ws.onopen=()=>{

log("Connected")

document.getElementById("status").textContent="Connected"

ws.send(JSON.stringify({
authorize:token
}))

}

ws.onmessage=(e)=>{

let data=JSON.parse(e.data)

handle(data)

}

}

function handle(data){

if(data.msg_type=="authorize"){

stats.balance=data.authorize.balance

document.getElementById("balance").textContent="$"+stats.balance

document.getElementById("startBtn").disabled=false

subscribe()

log("Authorized")

}

if(data.msg_type=="tick"){

ticks.push(data.tick.quote)

if(ticks.length>200)ticks.shift()

draw()

if(trading && !contract)trade()

}

if(data.msg_type=="proposal"){

ws.send(JSON.stringify({
buy:data.proposal.id,
price:document.getElementById("stake").value
}))

}

if(data.msg_type=="buy"){

contract=data.buy.contract_id

ws.send(JSON.stringify({
proposal_open_contract:1,
contract_id:contract,
subscribe:1
}))

}

if(data.msg_type=="proposal_open_contract"){

let c=data.proposal_open_contract

if(c.is_sold){

let profit=parseFloat(c.profit)

stats.trades++

stats.profit+=profit

if(profit>0)stats.wins++
else stats.loss++

updateStats()

addHistory(profit)

contract=null

}

}

}

function subscribe(){

let symbol=document.getElementById("symbol").value

ws.send(JSON.stringify({

ticks:symbol,
subscribe:1

}))

}

function trade(){

if(ticks.length<20)return

let rsi=calcRSI()

let action=null

if(rsi<30)action="CALL"
if(rsi>70)action="PUT"

if(!action)return

log("Signal "+action+" RSI "+rsi.toFixed(1))

ws.send(JSON.stringify({

proposal:1,
amount:document.getElementById("stake").value,
basis:"stake",
contract_type:action,
symbol:document.getElementById("symbol").value,
duration:document.getElementById("duration").value,
duration_unit:"s",
currency:"USD"

}))

}

function calcRSI(){

let gains=0
let losses=0

for(let i=1;i<14;i++){

let diff=ticks[ticks.length-i]-ticks[ticks.length-i-1]

if(diff>0)gains+=diff
else losses-=diff

}

let rs=gains/losses

return 100-(100/(1+rs))

}

function toggleBot(){

trading=!trading

let btn=document.getElementById("startBtn")

if(trading){

btn.textContent="STOP BOT"
btn.className="stop"

log("Bot started")

}

else{

btn.textContent="START BOT"
btn.className="start"

log("Bot stopped")

}

}

function updateStats(){

document.getElementById("profit").textContent="$"+stats.profit

document.getElementById("trades").textContent=stats.trades

let wr=stats.trades?((stats.wins/stats.trades)*100).toFixed(1):0

document.getElementById("winrate").textContent=wr+"%"

}

function addHistory(p){

let row=document.createElement("tr")

row.innerHTML=

"<td>"+new Date().toLocaleTimeString()+"</td>"+
"<td>Trade</td>"+
"<td>$"+document.getElementById("stake").value+"</td>"+
"<td>"+(p>0?"WIN":"LOSS")+"</td>"+
"<td>"+p+"</td>"

document.getElementById("history").prepend(row)

}

function draw(){

let canvas=document.getElementById("chart")
let ctx=canvas.getContext("2d")

let w=canvas.width
let h=canvas.height

ctx.clearRect(0,0,w,h)

let data=ticks.slice(-100)

let min=Math.min(...data)
let max=Math.max(...data)

for(let i=0;i<data.length;i++){

let x=i*(w/data.length)

let y=h-(data[i]-min)/(max-min)*h

if(i==0)ctx.moveTo(x,y)
else ctx.lineTo(x,y)

}

ctx.strokeStyle="#22c55e"
ctx.stroke()

}

</script>

</body>
</html>
