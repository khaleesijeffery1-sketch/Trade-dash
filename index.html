<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TradeX Advanced Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#e8f4ff;
margin:0;
padding:20px;
}

h1{
text-align:center;
color:#0a3d62;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

button{
background:#3498db;
border:none;
color:white;
padding:10px;
margin-top:5px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#217dbb;
}

input,select{
width:100%;
padding:8px;
margin-top:5px;
}

#loginScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#dff1ff;
display:flex;
justify-content:center;
align-items:center;
}

#loginBox{
background:white;
padding:30px;
border-radius:10px;
text-align:center;
}

</style>
</head>

<body>

<div id="loginScreen">

<div id="loginBox">

<h2>Enter Password</h2>

<input id="passwordInput" type="password">

<button onclick="login()">Enter</button>

</div>

</div>


<h1>TradeX Advanced Dashboard</h1>

<div class="grid">

<div class="card">

<h3>API Connection</h3>

<label>API Token</label>
<input id="token" type="password">

<button onclick="connectAPI()">Connect</button>
<button onclick="disconnectAPI()">Disconnect</button>

<p>Status: <span id="status">Disconnected</span></p>

<p>Balance: $<span id="balance">0</span></p>

</div>


<div class="card">

<h3>Market Settings</h3>

<select id="market">
<option value="R_25">Volatility 25</option>
<option value="R_50">Volatility 50</option>
<option value="R_75">Volatility 75</option>
<option value="R_100">Volatility 100</option>
</select>

<label>Duration (seconds)</label>
<input id="duration" type="number" value="30">

</div>


<div class="card">

<h3>Trade Settings</h3>

<label>Stake</label>
<input id="stake" type="number" value="1">

<label>Take Profit</label>
<input id="takeProfit" type="number" value="20">

<label>Stop Loss</label>
<input id="stopLoss" type="number" value="10">

<label>Max Loss Streak</label>
<input id="maxLossStreak" type="number" value="3">

</div>


<div class="card">

<h3>Bot Control</h3>

<button onclick="startBot()">Start Bot</button>
<button onclick="stopBot()">Stop Bot</button>

<p id="botStatus">Bot Stopped</p>

<p>Total Profit: $<span id="profit">0</span></p>

</div>


<div class="card">

<h3>Trade History</h3>

<ul id="history"></ul>

</div>


<div class="card">

<h3>Market Chart</h3>

<canvas id="chart"></canvas>

</div>

</div>


<script>

let ws;
let authorized=false;

let botRunning=false;
let totalProfit=0;
let lossStreak=0;

const status=document.getElementById("status");
const balance=document.getElementById("balance");
const profitDisplay=document.getElementById("profit");
const history=document.getElementById("history");
const botStatus=document.getElementById("botStatus");

let ctx=document.getElementById("chart").getContext("2d");

let chart=new Chart(ctx,{
type:"line",
data:{
labels:[],
datasets:[{
label:"Price",
data:[]
}]
}
});

function login(){

let pass=document.getElementById("passwordInput").value;

if(pass==="1234"){

document.getElementById("loginScreen").style.display="none";

}else{

alert("Wrong Password");

}

}

function connectAPI(){

let token=document.getElementById("token").value;

if(!token){
alert("Enter API token");
return;
}

ws=new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=1089");

ws.onopen=function(){

status.innerText="Connected";

ws.send(JSON.stringify({
authorize:token
}));

};

ws.onmessage=function(msg){

let data=JSON.parse(msg.data);

if(data.msg_type==="authorize"){

authorized=true;

status.innerText="Authorized";

getBalance();

subscribeTicks();

}

if(data.msg_type==="balance"){

balance.innerText=data.balance.balance;

}

if(data.msg_type==="tick"){

updateChart(data.tick.quote);

}

};

ws.onerror=function(){

status.innerText="Connection Error";

};

}

function disconnectAPI(){

if(ws){
ws.close();
}

authorized=false;
status.innerText="Disconnected";

}

function getBalance(){

ws.send(JSON.stringify({
balance:1
}));

}

function subscribeTicks(){

let symbol=document.getElementById("market").value;

ws.send(JSON.stringify({
ticks:symbol,
subscribe:1
}));

}

function updateChart(price){

chart.data.labels.push("");

chart.data.datasets[0].data.push(price);

if(chart.data.labels.length>50){

chart.data.labels.shift();
chart.data.datasets[0].data.shift();

}

chart.update();

}

function startBot(){

if(!authorized){

alert("Connect API first");
return;

}

botRunning=true;
botStatus.innerText="Bot Running";

tradeLoop();

}

function stopBot(){

botRunning=false;
botStatus.innerText="Bot Stopped";

}

function tradeLoop(){

if(!botRunning) return;

let stake=parseFloat(document.getElementById("stake").value);

let result=Math.random()>0.5?1:-1;

let profit=result*stake;

totalProfit+=profit;

profitDisplay.innerText=totalProfit.toFixed(2);

addHistory(profit);

riskCheck();

setTimeout(tradeLoop,5000);

}

function addHistory(p){

let li=document.createElement("li");

li.innerText="Trade Result: "+p;

history.prepend(li);

}

function riskCheck(){

let tp=parseFloat(document.getElementById("takeProfit").value);
let sl=parseFloat(document.getElementById("stopLoss").value);
let maxLoss=parseInt(document.getElementById("maxLossStreak").value);

if(totalProfit>=tp){

botRunning=false;
botStatus.innerText="Take Profit Hit";

}

if(totalProfit<=-sl){

botRunning=false;
botStatus.innerText="Stop Loss Hit";

}

if(totalProfit<0){

lossStreak++;

}else{

lossStreak=0;

}

if(lossStreak>=maxLoss){

botRunning=false;
botStatus.innerText="Loss Streak Stop";

}

}

</script>

</body>
</html>
